<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>PipelineModeling — Emotion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{font-family:system-ui,sans-serif;max-width:720px;margin:2rem auto;padding:0 1rem;color:#111}
    h1{margin-bottom:0}
    .row{display:flex;gap:1rem;align-items:center;margin:1rem 0}
    pre{background:#f5f5f5;padding:1rem;border-radius:8px;overflow:auto}
    button{padding:.5rem 1rem;border:0;background:#111;color:#fff;border-radius:6px;cursor:pointer}
    .status{font-size:.9rem;color:#555}
  </style>
</head>
<body>
  <h1>Emotion Classifier</h1>
  <p class="status" id="status">Loading model status…</p>

  <div class="row">
    <input type="file" id="file" accept="image/*" />
    <button id="send">Predict</button>
  </div>

  <h3>Result</h3>
  <pre id="out">—</pre>

<script>
const API = window.location.hostname === "localhost"
  ? "http://localhost:8000"
  : `${window.location.protocol}//${window.location.hostname}:8000`;

async function loadStatus() {
  try {
    const r = await fetch(`${API}/model/status`);
    const data = await r.json();
    document.getElementById("status").textContent =
      `model=${data.model_version} | classes=${data.classes.join(",")} | size=${data.image_size.join("x")}`;
  } catch (e) { document.getElementById("status").textContent = "backend unreachable"; }
}

document.getElementById("send").addEventListener("click", async () => {
  const f = document.getElementById("file").files[0];
  if (!f) { alert("Select an image"); return; }
  const fd = new FormData(); fd.append("file", f);
  const r = await fetch(`${API}/predict`, { method: "POST", body: fd });
  document.getElementById("out").textContent = JSON.stringify(await r.json(), null, 2);
});

loadStatus();
</script>
</body>
</html>
